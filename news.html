<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Insights | Prefab Technologies Limited</title>
    <meta name="description" content="Latest updates and insights from Prefab Technologies Limited.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .news-hero {
            height: 40vh;
            min-height: 300px;
            background: linear-gradient(135deg, rgba(0, 86, 179, 0.9), rgba(0, 68, 148, 0.95)), url('assets/images/hero_bg.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            margin-top: 80px;
        }
        .news-hero h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        .news-hero p { font-size: 1.1rem; opacity: 0.9; }
        .news-article-content {
            max-width: 900px;
            margin: -60px auto 5rem;
            background: white;
            padding: 4rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
            line-height: 1.8;
        }
        .news-article-content img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 2rem;
        }
        .news-article-content .date {
            display: inline-block;
            padding: 6px 16px;
            background: var(--primary-blue-light);
            color: var(--primary-blue);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .news-article-content h2 {
            font-size: 2.5rem;
            color: var(--primary-blue);
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }
        .news-article-content p {
            margin-bottom: 1.5rem;
            color: #444;
            font-size: 1.1rem;
        }
        body.dark-mode .news-article-content { background: #1e293b; color: white; }
        body.dark-mode .news-article-content p { color: #94a3b8; }

        @media (max-width: 768px) {
            .news-article-content { padding: 2rem; margin-top: -30px; }
            .news-article-content h2 { font-size: 1.8rem; }
            .news-article-content img { height: 250px; }
        }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <div class="container">
            <a href="index.html" class="logo-image">
                <img src="assets/images/logo.png" alt="Prefab Logo">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#news">News</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <header class="news-hero">
        <div class="container">
            <h1>News & Insights</h1>
            <p>Depth analysis and corporate updates.</p>
        </div>
    </header>

    <main class="container">
        <article class="news-article-content" id="articleBody">
            <!-- Content will be injected by JavaScript -->
        </article>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <div class="container" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <p>&copy; <span id="copyrightYear"></span> Prefab Technologies Limited. All rights reserved.</p>
                <p><a href="index.html" style="color: var(--primary-green);">Return to Homepage</a></p>
            </div>
        </div>
    </footer>

    <script>
        const newsData = {
            'cng-fleet': {
                title: "Expanding our CNG Fleet in Kaduna",
                date: "APRIL 12, 2026",
                image: "assets/images/hero_bg.png",
                content: `
                    <p>Prefab Technologies Limited is proud to announce the successful completion of Phase 2 of our Compressed Natural Gas (CNG) fleet expansion program in Kaduna State. This milestone adds 50 state-of-the-art green-energy buses to the existing metropolitan transit network.</p>
                    <p>The new fleet is equipped with advanced telematics and real-time fuel monitoring systems, ensuring maximum efficiency and safety for passengers. By transitioning to CNG, we are helping the state reduce its carbon footprint by an estimated 40% while significantly lowering operational costs compared to traditional diesel-powered alternatives.</p>
                    <p>“This expansion is a testament to our commitment to sustainable urban mobility,” said Dr. Nasir Usman Imam, CEO of Prefab Technologies. “We are not just providing transportation; we are building a cleaner, more efficient future for Nigeria.”</p>
                    <p>The buses feature modern amenities, including onboard Wi-Fi, automated fare collection systems, and climate control, providing an unparalleled experience for daily commuters.</p>
                `
            },
            'smart-city': {
                title: "Smart City Revenue Tracking Success",
                date: "MARCH 28, 2026",
                image: "assets/images/project_ict.png",
                content: `
                    <p>Our ICT division has recently reported a major success in our partnership with local government authorities for smart city revenue capturing and transit management. The latest quarterly report shows a 25% increase in revenue transparency and collection efficiency across several pilot terminals.</p>
                    <p>The implementation of our proprietary cloud-based tracking and automated fare collection (AFC) systems has eliminated significant revenue leakages that previously plagued traditional manual collection methods. This technological leap provides government partners with real-time data on passenger flows and financial performance.</p>
                    <p>“Data is the new oil for urban development,” noted Harisu Abubakar, COO. “Our smart solutions empower local administrations to better manage resources and reinvest in community infrastructure.”</p>
                    <p>The success of this program has led to several inquiries from other West African nations looking to modernize their metropolitan transit and revenue systems using Prefab Tech's proven framework.</p>
                `
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const article = newsData[id] || newsData['cng-fleet']; // Default to first news if id is missing

            const body = document.getElementById('articleBody');
            body.innerHTML = `
                <div class="date">${article.date}</div>
                <h2>${article.title}</h2>
                <img src="${article.image}" alt="${article.title}">
                <div class="full-text">
                    ${article.content}
                </div>
            `;
            
            document.title = `${article.title} | Prefab Technologies Limited`;
            document.getElementById('copyrightYear').innerText = new Date().getFullYear();
        });
    </script>
</body>
</html>
